---
# Variables specific to following versions:
# - SUSE Linux Enterprise Server for SAP Applications 15
# - SUSE Linux Enterprise Server 15

__sap_ha_pacemaker_cluster_sap_extra_packages_dict:
  minimal:
    - ClusterTools2
  hana_scaleout:
    - SAPHanaSR-ScaleOut
  hana_scaleup:
    - SAPHanaSR
  hana_angi:
    - SAPHanaSR-angi
  nwas:
    - sap-suse-cluster-connector
    - sapstartsrv-resource-agents

# Dictionary with zypper patterns for specific scenarios
__sap_ha_pacemaker_cluster_sap_zypper_patterns_dict:
  minimal:
    - ha_sles
  hana_scaleout: []
  hana_scaleup: []
  nwas: []

# Firewall
# NOTE: SLES 16 contains dependency between firewalld and python313-firewall package.

__sap_ha_pacemaker_cluster_firewall_extra_packages:
  "{{ __sap_ha_pacemaker_cluster_firewall_extra_packages_3
    if ansible_facts['distribution_version'].split('.')[1] | int < 6
    else __sap_ha_pacemaker_cluster_firewall_extra_packages_311 }}"

# The lists of bindings for specific python version
__sap_ha_pacemaker_cluster_firewall_extra_packages_3:
  - "python3-firewall"

__sap_ha_pacemaker_cluster_firewall_extra_packages_311:
  - "python311-firewall"
