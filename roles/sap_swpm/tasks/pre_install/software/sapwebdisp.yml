---

# Auto-detection checks:
# 1. Check if there is one or more files present.
# NOTE: This is a SAR file and it could be extracted to check for 'ansible_facts['architecture']',
# but it is not mandatory and it will be handled by 'sapinst'.

- name: SAP SWPM Pre Install - Find all SAPWEBDISP files in {{ __sap_swpm_fact_software_path }}
  ansible.builtin.find:
    paths: "{{ __sap_swpm_fact_software_path }}"
    patterns: 'SAPWEBDISP_*.SAR'
  register: __sap_swpm_register_sapwebdisp_files

- name: SAP SWPM Pre Install - Assert that SAPWEBDISP files were found
  ansible.builtin.assert:
    that:
      - __sap_swpm_register_sapwebdisp_files.files | length > 0
    success_msg: |
      SUCCESS: SAPWEBDISP files were found in '{{ __sap_swpm_fact_software_path }}'.
      Files: {{ __sap_swpm_register_sapwebdisp_files.files | map(attribute='path') | map('basename') | join(', ') }}
      They are not validated for compatibility with OS architecture '{{ ansible_facts['architecture'] }}'.
    fail_msg: |
      FAIL: No SAPWEBDISP files were found in '{{ __sap_swpm_fact_software_path }}'!
